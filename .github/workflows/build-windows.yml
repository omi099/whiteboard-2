name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate project from setup.sh
        shell: bash
        run: bash setup.sh

      - name: Install Qt 6.8.1
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.1"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          setup-python: false

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (CMake + Ninja)
        shell: pwsh
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Bundle Qt runtime (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/Whiteboard.exe dist/
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations --compiler-runtime dist/Whiteboard.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Whiteboard-windows-x64
          path: dist
