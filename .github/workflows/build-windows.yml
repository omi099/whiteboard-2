name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtpdf qtimageformats
          cache: true

      - name: Generate sources (setup.sh)
        shell: bash
        run: bash setup.sh
        
      - name: Export laser source files to a text file
        if: always()
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/pen-whiteboard"
          {
            for f in src/canvas/Canvas.cpp src/canvas/Canvas.h; do
              echo "===================================================================="
              if [ -f "$f" ]; then
                echo "===== FILE: $f ====="
                echo "===================================================================="
                cat "$f"
                echo
              else
                echo "===== MISSING: $f (not found) ====="
                echo "===================================================================="
              fi
              echo
            done
          } > "$GITHUB_WORKSPACE/laser_files.txt"
          echo "Wrote laser_files.txt"

      - name: Upload laser_files.txt (download from the run's Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laser-files
          path: laser_files.txt
          if-no-files-found: error
          retention-days: 7

      - name: Export source files to a text file
        if: always()
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/pen-whiteboard"
          {
            for f in \
              src/model/Page.h \
              src/model/Layer.h \
              src/model/Document.h \
              src/model/Document.cpp \
              src/model/Types.h \
              src/canvas/Canvas.h \
              src/canvas/Tools.h \
              src/core/Settings.h \
              src/ui/MainWindow.h \
              src/ui/MainWindow.cpp; do
              echo "===================================================================="
              if [ -f "$f" ]; then
                echo "===== FILE: $f ====="
                echo "===================================================================="
                cat "$f"
                echo
              else
                echo "===== MISSING: $f (not found) ====="
                echo "===================================================================="
              fi
              echo
            done
          } > "$GITHUB_WORKSPACE/laser_files.txt"
          echo "Wrote laser_files.txt"


      - name: Verify generated sources
        shell: bash
        run: |
          cd pen-whiteboard
          missing=0
          for f in \
            CMakeLists.txt \
            src/main.cpp \
            src/model/Types.h src/model/Item.h src/model/StrokeItem.h \
            src/model/ShapeItem.h src/model/TextItem.h src/model/ImageItem.h \
            src/model/Layer.h src/model/Page.h src/model/Document.h \
            src/model/Item.cpp src/model/StrokeItem.cpp src/model/ShapeItem.cpp \
            src/model/TextItem.cpp src/model/ImageItem.cpp src/model/Document.cpp \
            src/core/Settings.h src/core/Serializer.h src/core/Commands.h src/core/Exporter.h \
            src/core/Serializer.cpp src/core/Commands.cpp src/core/Exporter.cpp \
            src/canvas/Tools.h src/canvas/Canvas.h src/canvas/Canvas.cpp \
            src/ui/MainWindow.h src/ui/PreferencesDialog.h \
            src/ui/MainWindow.cpp src/ui/PreferencesDialog.cpp \
            packaging/installer.nsi README.md
          do
            if [ ! -f "$f" ]; then echo "MISSING: $f"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ">>> Source verification FAILED."
            exit 1
          fi
          echo "All expected sources are present."

      - name: Configure
        working-directory: pen-whiteboard
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: pen-whiteboard
        shell: pwsh
        run: |
          cmake --build build --config Release 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "==================== BUILD ERRORS ===================="
            Select-String -Path build.log -Pattern "error (C|LNK)\d+|error:|unresolved external|cannot open" |
              ForEach-Object { $_.Line }
            exit 1
          }

      - name: Deploy Qt runtime
        working-directory: pen-whiteboard
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/bin/Release/InkBoard.exe dist/
          windeployqt --release --compiler-runtime dist/InkBoard.exe

      - name: Package installer (NSIS)
        working-directory: pen-whiteboard
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" packaging/installer.nsi

      - name: Upload portable build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: InkBoard-portable
          path: pen-whiteboard/dist/**

      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: InkBoard-Setup
          path: pen-whiteboard/InkBoard-Setup.exe

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: pen-whiteboard/build.log
