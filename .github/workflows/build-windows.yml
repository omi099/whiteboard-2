name: Windows EXE Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Execute setup.sh to Generate C++ Architecture
      shell: bash
      run: |
        # Fix Windows line endings (CRLF -> LF) and run the script
        if [ -f "setup.sh" ]; then
          sed -i 's/\r$//' setup.sh
          chmod +x setup.sh
          ./setup.sh
        fi

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Ninja & aqtinstall
      shell: pwsh
      run: pip install ninja aqtinstall

    - name: Download & Install Qt 6.5.3
      shell: pwsh
      run: |
        python -m aqt install-qt windows desktop 6.5.3 win64_msvc2019_64

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake (Using Ninja)
      shell: pwsh
      run: |
        $QT_DIR = "${{ github.workspace }}/6.5.3/msvc2019_64"
        if (Test-Path "WhiteboardPro") { cd WhiteboardPro }
        
        # Ninja perfectly detects the compiler without the Visual Studio generator errors
        cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_DIR"

    - name: Build Application
      shell: pwsh
      run: |
        if (Test-Path "WhiteboardPro") { cd WhiteboardPro }
        cmake --build build --config Release

    - name: Package Dependencies (windeployqt)
      shell: pwsh
      run: |
        $QT_DIR = "${{ github.workspace }}/6.5.3/msvc2019_64"
        $ENV:PATH = "$QT_DIR/bin;" + $ENV:PATH
        
        mkdir deploy
        
        # Ninja places the EXE directly in the build folder. 
        # These checks guarantee we find it regardless of where setup.sh placed it.
        if (Test-Path "WhiteboardPro/build/WhiteboardPro.exe") {
            copy WhiteboardPro/build/WhiteboardPro.exe deploy/
        } elseif (Test-Path "build/WhiteboardPro.exe") {
            copy build/WhiteboardPro.exe deploy/
        } else {
            Write-Error "Could not find WhiteboardPro.exe. Build failed."
            exit 1
        }
        
        # Bundle required DLLs
        windeployqt --release --no-translations --no-opengl-sw deploy/WhiteboardPro.exe

    - name: Upload Final EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WhiteboardPro-Windows-Standalone
        path: deploy/
        retention-days: 7
