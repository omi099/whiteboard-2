name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

defaults:
  run:
    working-directory: pen-whiteboard   # <-- project lives here

jobs:
  windows:
    name: Windows x64 (MSVC)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtpdf qtimageformats'
          cache: true

      - name: Configure (Visual Studio 2022, x64)
        shell: pwsh
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt runtime (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build/bin/Release/InkBoard.exe" "dist/"
          windeployqt --release --compiler-runtime "dist/InkBoard.exe"

      - name: Build installer (NSIS)
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" packaging/installer.nsi

      - name: Upload portable build (exe + Qt runtime)
        uses: actions/upload-artifact@v4
        with:
          name: InkBoard-windows-portable
          path: pen-whiteboard/dist/**          # <-- path is repo-root relative
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: InkBoard-windows-installer
          path: pen-whiteboard/InkBoard-Setup.exe   # <-- repo-root relative
          if-no-files-found: error
