name: Windows EXE Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Execute setup.sh to Generate C++ Architecture
      shell: bash
      run: |
        # Fix Windows line endings (CRLF -> LF) and run the script
        if [ -f "setup.sh" ]; then
          sed -i 's/\r$//' setup.sh
          chmod +x setup.sh
          ./setup.sh
        fi

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Download & Install Qt 6.5.3
      shell: pwsh
      run: |
        pip install aqtinstall
        python -m aqt install-qt windows desktop 6.5.3 win64_msvc2019_64

    - name: Configure CMake
      shell: pwsh
      run: |
        $QT_DIR = "${{ github.workspace }}/6.5.3/msvc2019_64"
        if (Test-Path "WhiteboardPro") { cd WhiteboardPro }
        
        # Removed the strict -G Visual Studio flag. CMake will safely auto-detect the default compiler.
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_DIR"

    - name: Build Application
      shell: pwsh
      run: |
        if (Test-Path "WhiteboardPro") { cd WhiteboardPro }
        cmake --build build --config Release

    - name: Package Dependencies (windeployqt)
      shell: pwsh
      run: |
        $QT_DIR = "${{ github.workspace }}/6.5.3/msvc2019_64"
        $ENV:PATH = "$QT_DIR/bin;" + $ENV:PATH
        
        mkdir deploy
        
        if (Test-Path "WhiteboardPro/build/Release/WhiteboardPro.exe") {
            copy WhiteboardPro/build/Release/WhiteboardPro.exe deploy/
        } else {
            copy build/Release/WhiteboardPro.exe deploy/
        }
        
        windeployqt --release --no-translations --no-opengl-sw deploy/WhiteboardPro.exe

    - name: Upload Final EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WhiteboardPro-Windows-Standalone
        path: deploy/
        retention-days: 7
